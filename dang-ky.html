<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dare to be Me — Đăng ký</title>
<link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Display:ital,wght@0,700;0,800;1,500&family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #e2dada; --surface: #FFFFFF; --text: #2d2420; --text-muted: #5a4a45;
    --accent: #c9a882; --accent-soft: rgba(201, 168, 130, 0.18); --border: rgba(45, 36, 32, 0.12);
    --brand: #80716c; --nav-bg: #2d2420;
    --font-h: 'Noto Serif Display', serif; --font-b: 'Montserrat', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font-b); background: var(--bg); color: var(--text); line-height: 1.6; padding: 40px 20px; }
  .container { max-width: 480px; margin: 0 auto; background: var(--surface); padding: 32px; border-radius: 14px; box-shadow: 0 4px 24px rgba(45,36,32,0.13); border: 1px solid var(--border); }
  h1 { font-family: var(--font-h); font-size: 24px; margin-bottom: 8px; color: var(--text); }
  .lead { color: var(--text-muted); margin-bottom: 24px; font-size: 14px; }
  label { display: block; font-size: 13px; font-weight: 600; margin: 12px 0 6px; color: var(--text); }
  input, select { width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 15px; font-family: var(--font-b); background: var(--bg); color: var(--text); }
  input:focus, select:focus { outline: none; border-color: var(--accent); }
  .cta { width: 100%; background: var(--accent); color: var(--nav-bg); padding: 14px; font-size: 15px; font-weight: 700; font-family: var(--font-b); letter-spacing: 0.05em; text-transform: uppercase; border: none; border-radius: 50px; cursor: pointer; margin-top: 20px; }
  .cta:hover { opacity: 0.92; }
  .cta:disabled { background: #999; cursor: not-allowed; }
  .error { color: #a04040; font-size: 13px; margin-top: 8px; display: none; }
</style>
</head>
<body>
<div class="container">
  <h1>Đăng ký Dare to be Me</h1>
  <p class="lead">Điền thông tin để tiếp tục đến trang thanh toán.</p>

  <form id="orderForm">
    <label>Họ tên *</label>
    <input type="text" name="name" required>

    <label>Số điện thoại *</label>
    <input type="tel" name="phone" required pattern="[0-9]{10,11}">

    <label>Email *</label>
    <input type="email" name="email" required>

    <label>Mục tiêu của bạn</label>
    <select name="goal">
      <option value="">-- Chọn mục tiêu --</option>
      <option value="Tự tin giao tiếp hơn">Tự tin giao tiếp hơn</option>
      <option value="Dám từ chối, giữ ranh giới">Dám từ chối, giữ ranh giới</option>
      <option value="Chủ động hơn trong công việc">Chủ động hơn trong công việc</option>
    </select>

    <button type="submit" class="cta" id="submitBtn">Tiếp tục thanh toán →</button>
    <p class="error" id="error"></p>
  </form>
</div>

<script>
  const GAS_URL = 'https://script.google.com/macros/s/AKfycbyiGUVDOXoV81TG6JbJ2zXNaM531DFGr5AdKLCWhinVHg-_MmMwQtmLa-80SYk055_X/exec';

  document.getElementById('orderForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('submitBtn');
    const errEl = document.getElementById('error');
    errEl.style.display = 'none';
    btn.disabled = true;
    btn.textContent = 'Đang xử lý...';

    const form = new FormData(e.target);
    const data = {
      name: form.get('name'),
      phone: form.get('phone'),
      email: form.get('email'),
      goal: form.get('goal'),
      bump1: false,
      bump2: false,
      totalAmount: 443000
    };

    try {
      const res = await fetch(GAS_URL, {
        method: 'POST',
        body: JSON.stringify({ action: 'createOrder', data: data })
      });
      const json = await res.json();
      if (!json.success) throw new Error(json.error || 'Order creation failed');

      sessionStorage.setItem('order', JSON.stringify({
        orderId: json.orderId,
        ckContent: json.ckContent,
        totalAmount: json.totalAmount,
        name: data.name,
        email: data.email,
        phone: data.phone,
        goal: data.goal
      }));

      window.location.href = '/checkout';
    } catch (err) {
      errEl.textContent = 'Lỗi: ' + err.message + '. Vui lòng thử lại.';
      errEl.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Tiếp tục thanh toán →';
    }
  });
</script>
</body>
</html>
